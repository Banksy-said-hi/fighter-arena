app = "fighter-arena"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256

[env]
  DB_PATH = "/data/fighter.db"

[[mounts]]
  source      = "fighter_data"
  destination = "/data"
